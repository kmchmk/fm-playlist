services:
  app:
    build:
      context: .
      args:
        # NEXT_PUBLIC_* vars must be passed at build time so Next.js can inline them.
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      # Built from POSTGRES_* vars in .env. Single source of truth.
      DATABASE_URL: "postgres://${POSTGRES_USER:-fmplaylist}:${POSTGRES_PASSWORD:-fmplaylist}@db:5432/${POSTGRES_DB:-fm_playlist}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fm_playlist}
      POSTGRES_USER: ${POSTGRES_USER:-fmplaylist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fmplaylist}
    # Uncomment to expose Postgres to the host for debugging:
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fmplaylist} -d ${POSTGRES_DB:-fm_playlist}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
